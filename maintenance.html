<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GymTracker - Updating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    h1 { color: #60a5fa; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #71717a; font-size: 0.875rem; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #27272a; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 1s linear infinite; margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note { margin-top: 1rem; color: #52525b; font-size: 0.75rem; }
  </style>
  <script>
    // Auto-refresh every 10 seconds to check if the app is back
    setTimeout(() => location.reload(), 10000);
  </script>
</head>
<body>
  <div class="container">
    <h1>GymTracker</h1>
    <p>We're updating the app. This usually takes less than a minute.</p>
    <div class="spinner"></div>
    <p class="note">This page will refresh automatically when the update is complete.</p>
  </div>
</body>
</html>
