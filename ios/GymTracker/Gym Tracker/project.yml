name: Gym Tracker
options:
  bundleIdPrefix: dev.lethal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "35GARX3Y35"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Gym Tracker:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
      - path: Components
    settings:
      base:
        INFOPLIST_FILE: Gym-Tracker-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.lethal.gymtracker.native
        PRODUCT_NAME: GymTracker
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: "Gym Tracker/Gym Tracker.entitlements"
    capabilities:
      - HealthKit
