name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "ci/**", "chore/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: test-secret-for-ci-only
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ tests/ --output-format=github
