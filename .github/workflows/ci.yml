name: CI

on:
  push:
    branches: ["main", "dev", "fix/**", "feat/**", "ci/**", "chore/**", "refactor/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: homegym_test
          POSTGRES_USER: homegym
          POSTGRES_PASSWORD: homegym_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homegym"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          PYTHONPATH: .
          JWT_SECRET_KEY: test-secret-for-ci-only
          DATABASE_URL: postgresql+asyncpg://homegym:homegym_secret@localhost:5432/homegym_test
          DATABASE_SYNC_URL: postgresql://homegym:homegym_secret@localhost:5432/homegym_test
          TEST_DATABASE_URL: postgresql+asyncpg://homegym:homegym_secret@localhost:5432/homegym_test
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ tests/ --output-format=github
