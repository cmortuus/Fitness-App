services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=homegym
      - POSTGRES_USER=homegym
      - POSTGRES_PASSWORD=homegym_secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegym"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data_dev:
