# GymTracker nginx reverse proxy
#
# SETUP INSTRUCTIONS:
# 1. Install nginx:        sudo apt install nginx -y
# 2. Copy this config:     sudo cp nginx/gymtracker.conf /etc/nginx/sites-available/gymtracker
# 3. Edit SERVER_NAME:     sudo nano /etc/nginx/sites-available/gymtracker
#                          Replace YOUR_DOMAIN_OR_IP with your domain or VPS IP
# 4. Enable site:          sudo ln -sf /etc/nginx/sites-available/gymtracker /etc/nginx/sites-enabled/
# 5. Remove default:       sudo rm -f /etc/nginx/sites-enabled/default
# 6. Test & reload:        sudo nginx -t && sudo systemctl restart nginx
#
# FOR HTTPS (with a domain):
# 7. Install certbot:      sudo apt install certbot python3-certbot-nginx -y
# 8. Get SSL cert:         sudo certbot --nginx -d YOUR_DOMAIN
#    Certbot will auto-modify this file to add SSL and redirect HTTP→HTTPS.
#    It also auto-renews via systemd timer.
#
# FOR HTTPS (IP only, self-signed):
# 7. Generate cert:        sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#                             -keyout /etc/ssl/private/gymtracker.key \
#                             -out /etc/ssl/certs/gymtracker.crt \
#                             -subj "/CN=YOUR_VPS_IP"
# 8. Uncomment the ssl server block below and comment out the port 80 block.

# ── HTTP (port 80) ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Frontend (SvelteKit)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (FastAPI)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support (if needed)
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

