# Cookie-based routing: users with gymtracker_branch=dev cookie
# get routed to the dev container, everyone else to main.
#
# Users toggle this in Settings → Developer → "Use dev version"

upstream main_app { server main:80; }
upstream dev_app  { server dev:80;  }

map $cookie_gymtracker_branch $backend {
    "dev"   dev_app;
    default main_app;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name lethal.dev;
    return 301 https://$host$request_uri;
}

# Fallback HTTP (for health checks from localhost)
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name lethal.dev;

    ssl_certificate /etc/letsencrypt/live/lethal.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lethal.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
