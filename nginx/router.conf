# Cookie-based routing: users with gymtracker_branch=dev cookie
# get routed to the dev container, everyone else to main.
#
# Users toggle this in Settings → Developer → "Use dev version"

upstream main_app { server main:80; }
upstream dev_app  { server dev:80;  }

map $cookie_gymtracker_branch $backend {
    "dev"   dev_app;
    default main_app;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
