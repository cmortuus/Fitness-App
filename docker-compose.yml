services:
  # Nginx router — cookie-based routing between main and dev
  router:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/router.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - main
      - dev
    restart: unless-stopped

  # Main (stable) branch
  main:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    volumes:
      - main_data:/app/data
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - DATABASE_URL=sqlite+aiosqlite:///./data/homegym.db
      - DATABASE_SYNC_URL=sqlite:///./data/homegym.db
    restart: unless-stopped

  # Dev branch — built from the dev branch checkout
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    volumes:
      - dev_data:/app/data
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - DATABASE_URL=sqlite+aiosqlite:///./data/homegym.db
      - DATABASE_SYNC_URL=sqlite:///./data/homegym.db
    restart: unless-stopped

volumes:
  main_data:
  dev_data:
