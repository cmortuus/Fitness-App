services:
  # Nginx router — cookie-based routing between main and dev
  router:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/router.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - main
      - dev
    restart: unless-stopped

  # Main (stable) branch
  main:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    volumes:
      - shared_data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/homegym.db
      - DATABASE_SYNC_URL=sqlite:///./data/homegym.db
    restart: unless-stopped

  # Dev branch — built from the dev branch checkout
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    volumes:
      - shared_data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/homegym.db
      - DATABASE_SYNC_URL=sqlite:///./data/homegym.db
    restart: unless-stopped

volumes:
  shared_data:
