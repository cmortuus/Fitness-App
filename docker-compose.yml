services:
  # PostgreSQL — shared database for all app containers
  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=homegym
      - POSTGRES_USER=homegym
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-homegym_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegym"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Nginx router — cookie-based routing between main and dev
  router:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/router.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - main
      - dev
    restart: unless-stopped

  # Main (stable) branch
  main:
    image: gymtracker-main:latest
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://homegym:${POSTGRES_PASSWORD:-homegym_secret}@db:5432/homegym
      - DATABASE_SYNC_URL=postgresql://homegym:${POSTGRES_PASSWORD:-homegym_secret}@db:5432/homegym
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Dev branch
  dev:
    image: gymtracker-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://homegym:${POSTGRES_PASSWORD:-homegym_secret}@db:5432/homegym
      - DATABASE_SYNC_URL=postgresql://homegym:${POSTGRES_PASSWORD:-homegym_secret}@db:5432/homegym
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
